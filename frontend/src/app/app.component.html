<div class="app-shell">
  <aside class="sidebar" [class.collapsed]="state.sidebarCollapsed()">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2">
          <defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs>
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      @if (!state.sidebarCollapsed()) {
        <div class="logo-text">
          <span class="logo-title">PortfolioAI</span>
          <span class="logo-subtitle">Multi-Agent Platform</span>
        </div>
      }
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.exact }"
           class="nav-item"
           [title]="item.label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path [attr.d]="item.icon"/>
          </svg>
          @if (!state.sidebarCollapsed()) {
            <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <button class="sidebar-toggle" (click)="state.toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        @if (!state.sidebarCollapsed()) {
          <path d="M15 18l-6-6 6-6"/>
        } @else {
          <path d="M9 18l6-6-6-6"/>
        }
      </svg>
    </button>
  </aside>

  <main class="main-content" [class.collapsed]="state.sidebarCollapsed()">
    <router-outlet />
  </main>
</div>
